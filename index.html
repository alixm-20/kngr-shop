<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر كنغر - KNGR Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { 
            background-color: #efe3e3; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
            overflow-x: hidden;
        }
        
        /* شريط التنقل */
        .navbar { 
            background: #694551; 
            height: 70px; 
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
        }
        
        .navbar-brand { 
            font-weight: bold; 
            color: white !important; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            z-index: 10;
        }

        /* ========================================= */
        /* منطقة حركة الكنغر (العودة للبساطة) */
        /* ========================================= */
        
        .kngr-animation-area {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .kangaroo {
            width: 50px;
            height: 45px;
            position: absolute;
            bottom: 10px; /* المسافة من أسفل البار */
            background-size: contain;
            background-repeat: no-repeat;
            /* الأنيميشن الأول للمسار، والثاني لتبديل الأرجل والقفز */
            animation: 
                move-across 15s linear infinite,
                jump-frames 0.8s infinite;
        }

        /* تحريك الكنغر من اليسار لليمين */
        @keyframes move-across {
            0% { left: -60px; }
            100% { left: 100%; }
        }

        /* تبديل الصور لمحاكاة القفز في نفس المكان */
        @keyframes jump-frames {
            0%, 49% { 
                background-image: url('images/first.png'); 
                transform: translateY(0);
            }
            50%, 100% { 
                background-image: url('images/second.png'); 
                transform: translateY(-10px); /* رفع خفيف أثناء القفز */
            }
        }
        /* ========================================= */

        /* القائمة الجانبية */
        .side-nav { 
            height: 100%; 
            width: 0; 
            position: fixed; 
            z-index: 2000; 
            top: 0; 
            left: 0; 
            background-color: #694551; 
            transition: 0.4s; 
            padding-top: 60px; 
            overflow-x: hidden;
        }

        .side-nav a { 
            padding: 15px 25px; 
            color: #efe3e3; 
            display: block; 
            text-decoration: none;
            text-align: right;
        }

        .menu-btn { cursor: pointer; color: white; font-size: 1.4rem; z-index: 10; }
        
        .overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); 
            z-index: 1500; 
        }

        /* المنتجات */
        .product-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid #ddd;
            height: 100%;
            transition: 0.3s;
            text-decoration: none;
            color: black;
            display: block;
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .product-card img { max-width: 100%; height: 150px; object-fit: contain; }
        .price { color: #e74c3c; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div id="sideMenu" class="side-nav">
    <a href="javascript:void(0)" onclick="closeNav()" style="font-size: 2rem;">&times;</a>
    <a href="#">الرئيسية</a>
    <a href="#">الأدوات الرياضية</a>
    <a href="#">العناية الشخصية</a>
    <a href="#">إكسسوارات السيارات</a>
</div>

<div id="overlay" onclick="closeNav()"></div>

<nav class="navbar mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="#">
            <img src="logo-web.png" width="35" style="border-radius: 5px;">
            <span>متجر كنغر</span>
        </a>

        <div class="kngr-animation-area">
            <div class="kangaroo"></div>
        </div>

        <div class="d-flex align-items-center gap-3">
            <a href="#" class="text-white"><i class="fab fa-whatsapp"></i></a>
            <div class="menu-btn" onclick="openNav()"><i class="fas fa-bars"></i></div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row g-3">
        <div class="col-6 col-md-3">
            <a href="#" class="product-card">
                <img src="boxing.png">
                <h6 class="mt-2">مجموعة تقوية القبضة</h6>
                <div class="price">13,000 د.ع</div>
            </a>
        </div>
        <div class="col-6 col-md-3">
            <a href="#" class="product-card">
                <img src="projector.png">
                <h6 class="mt-2">جهاز عرض ضوء القمر</h6>
                <div class="price">18,000 د.ع</div>
            </a>
        </div>
    </div>
</div>

<script>
    function openNav() { 
        document.getElementById("sideMenu").style.width = "250px"; 
        document.getElementById("overlay").style.display = "block";
    }
    function closeNav() { 
        document.getElementById("sideMenu").style.width = "0"; 
        document.getElementById("overlay").style.display = "none";
    }
</script>

</body>
</html>
